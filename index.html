<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar Quiz - 6 Weeks</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #f5f7fa;
  color: #333;
  line-height: 1.6;
  padding-bottom: 40px;
}
header {
  background: linear-gradient(135deg, #4a90d9, #357abd);
  color: #fff;
  padding: 16px 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
header h1 {
  font-size: 1.1rem;
  margin-bottom: 10px;
  text-align: center;
}
.progress-bar {
  background: rgba(255,255,255,0.25);
  border-radius: 6px;
  height: 8px;
  margin-bottom: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  background: #7bed9f;
  height: 100%;
  border-radius: 6px;
  transition: width 0.4s;
}
.progress-text {
  font-size: 0.75rem;
  text-align: center;
  margin-bottom: 8px;
  opacity: 0.9;
}
.tabs {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
  border: none;
  color: rgba(255,255,255,0.8);
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: background 0.2s;
  position: relative;
}
.tab-btn.active {
  background: #f5f7fa;
  color: #333;
  font-weight: 600;
}
.tab-btn .check-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #7bed9f;
  margin-left: 4px;
  vertical-align: middle;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
}
.week-page { display: none; }
.week-page.active { display: block; }
.section-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.section-card h2 {
  font-size: 1rem;
  color: #4a90d9;
  margin-bottom: 4px;
}
.section-card h3 {
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 14px;
  font-weight: normal;
}
.question {
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid #eee;
}
.question:last-of-type { border-bottom: none; }
.q-text {
  font-size: 0.92rem;
  margin-bottom: 6px;
}
.q-text .q-num { font-weight: 600; color: #4a90d9; }
.input-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}
.input-row input[type="text"] {
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.9rem;
  width: 180px;
  max-width: 100%;
  transition: border-color 0.2s;
  outline: none;
}
.input-row input[type="text"]:focus {
  border-color: #4a90d9;
}
.input-row input.correct { border-color: #27ae60; background: #eafaf1; }
.input-row input.wrong { border-color: #e74c3c; background: #fdf2f2; }
.result-icon {
  font-size: 1.1rem;
  display: none;
}
.result-icon.show { display: inline; }
.explanation {
  display: none;
  background: #fff8e1;
  border-left: 3px solid #f0ad4e;
  padding: 8px 10px;
  margin-top: 6px;
  border-radius: 0 6px 6px 0;
  font-size: 0.82rem;
  color: #555;
}
.explanation.show { display: block; }
.correct-answer {
  display: none;
  font-size: 0.85rem;
  color: #e74c3c;
  margin-top: 4px;
}
.correct-answer.show { display: block; }
.radio-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  border: 2px solid transparent;
  transition: background 0.2s;
}
.radio-group label:hover { background: #f0f4f8; }
.radio-group label.correct-choice { border-color: #27ae60; background: #eafaf1; }
.radio-group label.wrong-choice { border-color: #e74c3c; background: #fdf2f2; }
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-grade { background: #4a90d9; color: #fff; }
.btn-reset { background: #eee; color: #555; }
.score-display {
  display: none;
  font-size: 1rem;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 8px;
  margin-top: 12px;
  text-align: center;
}
.score-display.show { display: block; }
.score-display.perfect { background: #eafaf1; color: #27ae60; }
.score-display.good { background: #e8f4fd; color: #2980b9; }
.score-display.needs-work { background: #fdf2f2; color: #c0392b; }
.freetext-model {
  display: none;
  background: #e8f4fd;
  border-left: 3px solid #4a90d9;
  padding: 8px 10px;
  margin-top: 6px;
  border-radius: 0 6px 6px 0;
  font-size: 0.82rem;
  color: #333;
}
.freetext-model.show { display: block; }
textarea.answer-area {
  width: 100%;
  min-height: 60px;
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
textarea.answer-area:focus { border-color: #4a90d9; }
.sep { margin-top: 10px; padding-top: 10px; border-top: 2px dashed #e0e0e0; }
.sep-label {
  font-size: 0.8rem;
  color: #999;
  margin-bottom: 8px;
  font-weight: 600;
}
@media (max-width: 480px) {
  .container { padding: 10px; }
  .section-card { padding: 14px; }
  .input-row input[type="text"] { width: 140px; }
  .tab-btn { padding: 7px 10px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<header>
  <h1>English Grammar Quiz (6 Weeks)</h1>
  <div class="progress-text" id="progressText">進捗: 0 / 6 週 完了</div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="container" id="app"></div>

<script>
// ========== DATA ==========
const DATA = [
  // WEEK 1
  {
    week: 1,

    sections: [
      {
        id: "w1s1",

          { type:"fill", prompt:"I _______ (already / finish) packing my suitcase.", blanks:1, answers:[["have already finished"]], explanation:"already → 現在完了のサイン。今に繋がる結果。" },
          { type:"fill", prompt:"We _______ (move) to this apartment last March.", blanks:1, answers:[["moved"]], explanation:"last March → 過去の特定時点なので過去形。" },
          { type:"fill2", prompt:"_______ you ever _______ (try) Thai food before?", answers:[["have"],["tried"]], explanation:"ever → 現在完了のサイン。経験を聞いている。" },
          { type:"fill", prompt:"He _______ (start) his new job in 2025.", blanks:1, answers:[["started"]], explanation:"in 2025 → 過去の特定時点なので過去形。" },
          { type:"fill", prompt:"She _______ (work) at this company since April.", blanks:1, answers:[["has worked"]], explanation:"since April → 現在完了のサイン。今も続いている。" },
          { type:"fill", prompt:"I _______ (not / see) that movie before.", blanks:1, answers:[["haven't seen","have not seen"]], explanation:"before → 現在完了。今までの経験。" },

          { type:"fill", prompt:"She _______ (bake) 3 cakes so far.", blanks:1, answers:[["has baked"]], explanation:"結果・回数 → 現在完了" },
          { type:"fill2", prompt:"How long _______ you _______ (wait) for the bus?", answers:[["have"],["been waiting"]], explanation:"継続中の動作 → 現在完了進行形" },
          { type:"fill", prompt:"We _______ (visit) 50 temples this trip.", blanks:1, answers:[["have visited"]], explanation:"結果・回数 → 現在完了" },
          { type:"fill", prompt:"It _______ (snow) all day.", blanks:1, answers:[["has been snowing"]], explanation:"継続中の動作 → 現在完了進行形" },
          { type:"fill", prompt:"He _______ (read) that novel. He's on chapter 5 now.", blanks:1, answers:[["has been reading"]], explanation:"まだ読んでいる途中 → 現在完了進行形" },
          { type:"fill", prompt:"I _______ (wash) 10 dishes today.", blanks:1, answers:[["have washed"]], explanation:"結果・回数 → 現在完了" },
          { type:"fill", prompt:"They _______ (discuss) the wedding plans since this morning.", blanks:1, answers:[["have been discussing"]], explanation:"継続中の動作 → 現在完了進行形" },
        ]
      },
      {
        id: "w1s3",
        title: "練習問題 1-3",

          { type:"fill2", prompt:"I _______ (not / know) about the party because nobody _______ (tell) me.", answers:[["didn't know","did not know"],["had told"]], explanation:"誰も教えてくれなかった(先) → 知らなかった(後)" },
          { type:"fill2", prompt:"She _______ (finish) cooking before the guests _______ (come).", answers:[["had finished"],["came"]], explanation:"料理が先に終わった → ゲストが後から来た" },
          { type:"fill2", prompt:"After he _______ (check) the map, he _______ (find) the right route.", answers:[["had checked"],["found"]], explanation:"地図を確認(先) → ルートを見つけた(後)" },
          { type:"fill2", prompt:"I _______ (never / eat) sushi before I _______ (visit) Japan.", answers:[["had never eaten"],["visited"]], explanation:"日本に行く前は食べたことがなかった" },

          { type:"fill2", prompt:"They _______ (not / book) a hotel before they _______ (leave) for the trip.", answers:[["hadn't booked","had not booked"],["left"]], explanation:"旅行に出発する前にホテルを予約していなかった" },
        ]
      }
    ]
  },
  // WEEK 2
  {
    week: 2,
    title: "関係代名詞 + 受動態",
    sections: [
      {
        id: "w2s1",
        title: "練習問題 2-1",
        subtitle: "関係代名詞",
        questions: [
          { type:"fill", prompt:"The suitcase _______ weighs over 20 kg needs to be checked in.", blanks:1, answers:[["which","that"]], explanation:"主格、省略不可。物なので which / that。" },
          { type:"fill", prompt:"The recipe _______ I found online turned out great.", blanks:1, answers:[["which","that"]], explanation:"目的格、省略可。物なので which / that。" },
          { type:"fill", prompt:"She is the teacher _______ class is always full.", blanks:1, answers:[["whose"]], explanation:"所有を表すので whose。" },
          { type:"fill", prompt:"This coffee shop, _______ is near the station, has excellent pastries.", blanks:1, answers:[["which"]], explanation:"非制限用法 → that は不可。which を使う。" },
          { type:"fill", prompt:"The gym _______ we work out is open 24 hours.", blanks:1, answers:[["where"]], explanation:"場所を表すので where。" },

          { type:"free", prompt:"We have not cleaned the kitchen yet.", model:"The kitchen has not been cleaned yet." },
          { type:"free", prompt:"They will publish the magazine next month.", model:"The magazine will be published next month." },
          { type:"free", prompt:"Someone stole my bicycle from the parking lot.", model:"My bicycle was stolen from the parking lot." },
          { type:"free", prompt:"The staff are preparing the banquet hall right now.", model:"The banquet hall is being prepared by the staff right now." },
        ]
      },
      {
        id: "w2s3",
        title: "練習問題 2-2b",
        subtitle: "受動態→能動態に書き換えなさい。",
        questions: [
          { type:"free", prompt:"The goal was scored by the youngest player on the team.", model:"The youngest player on the team scored the goal." },
          { type:"free", prompt:"The concert tickets have been sold out online.", model:"They have sold out the concert tickets online." },
          { type:"free", prompt:"The new menu is being tested by the head chef.", model:"The head chef is testing the new menu." },
        ]
      },
      {
        id: "w2s4",
        title: "練習問題 2-2c",
        subtitle: "適切な受動態の形を書きなさい。",
        questions: [
          { type:"fill", prompt:"English (speak) _______ in many countries.", blanks:1, answers:[["is spoken"]], explanation:"一般的事実の受動態 → is spoken" },
          { type:"fill", prompt:"The letter (write) _______ by her last week.", blanks:1, answers:[["was written"]], explanation:"last week → 過去の受動態" },
          { type:"fill", prompt:"The laundry (not / fold) _______ yet.", blanks:1, answers:[["has not been folded","hasn't been folded"]], explanation:"yet → 現在完了の受動態" },
          { type:"fill", prompt:"The flight (expect) _______ to arrive at 3 PM.", blanks:1, answers:[["is expected"]], explanation:"一般的な受動態 → is expected" },
          { type:"fill", prompt:"All the homework (finish) _______ before dinner.", blanks:1, answers:[["has been finished"]], explanation:"現在完了の受動態" },
          { type:"fill", prompt:"The cake (decorate) _______ by the baker right now.", blanks:1, answers:[["is being decorated"]], explanation:"right now → 現在進行形の受動態" },
        ]
      }
    ]
  },
  // WEEK 3
  {
    week: 3,
    title: "仮定法 + 分詞構文",

      {
        id: "w3s1",
        title: "練習問題 3-1",

        questions: [
          { type:"fill2", prompt:"[仮定法過去] If I _______ (have) a car, I _______ (drive) to work instead of taking the bus.", answers:[["had"],["would drive"]], explanation:"仮定法過去: If + 過去形, would + 原形" },

          { type:"fill2", prompt:"[仮定法過去] I _______ (join) the gym if I _______ (have) more free time.", answers:[["would join"],["had"]], explanation:"仮定法過去: 主節と条件節が逆の語順" },

          { type:"fill2", prompt:"[仮定法過去完了] If we _______ (leave) earlier, we _______ (catch) the last train.", answers:[["had left"],["would have caught"]], explanation:"仮定法過去完了: If + had p.p., would have p.p." },
          { type:"fill2", prompt:"[仮定法過去完了] The picnic _______ (not / be ruined) if it _______ (not / rain) that day.", answers:[["would not have been ruined","wouldn't have been ruined"],["had not rained","hadn't rained"]], explanation:"仮定法過去完了: 主節と条件節が逆の語順" },

      {
        id: "w3s2",

// ========== RENDER ==========
const tabsEl = document.getElementById('tabs');
const appEl = document.getElementById('app');

function norm(s) { return s.trim().toLowerCase().replace(/\s+/g,' '); }

function checkAnswer(userVal, acceptedList) {
  const u = norm(userVal);
  return acceptedList.some(a => norm(a) === u);
}

// Build tabs
DATA.forEach((w, wi) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (wi === 0 ? ' active' : '');
  btn.dataset.week = wi;
  btn.innerHTML = `Week ${w.week}<span class="check-dot" id="dot-${wi}" style="display:none"></span>`;
  btn.onclick = () => switchWeek(wi);
  tabsEl.appendChild(btn);
});

// Build pages
DATA.forEach((w, wi) => {
  const page = document.createElement('div');
  page.className = 'week-page' + (wi === 0 ? ' active' : '');
  page.id = `week-${wi}`;

  let html = `<h2 style="font-size:1.15rem;margin:12px 0 16px;color:#333;">Week ${w.week}: ${w.title}</h2>`;

  w.sections.forEach((sec, si) => {
    html += `<div class="section-card" id="${sec.id}">`;
    html += `<h2>${sec.title}</h2><h3>${sec.subtitle}</h3>`;

    sec.questions.forEach((q, qi) => {
      const qid = `${sec.id}_q${qi}`;
      html += `<div class="question" id="${qid}_wrap">`;
      html += `<div class="q-text"><span class="q-num">${qi+1}.</span> ${escHtml(q.prompt)}</div>`;

      if (q.type === 'fill') {
        html += `<div class="input-row"><input type="text" id="${qid}_0" autocomplete="off" autocapitalize="off"> <span class="result-icon" id="${qid}_icon"></span></div>`;
        html += `<div class="correct-answer" id="${qid}_ca"></div>`;
        html += `<div class="explanation" id="${qid}_exp">${escHtml(q.explanation || '')}</div>`;
      } else if (q.type === 'fill2') {
        html += `<div class="input-row"><input type="text" id="${qid}_0" autocomplete="off" autocapitalize="off" placeholder="1つ目"> <input type="text" id="${qid}_1" autocomplete="off" autocapitalize="off" placeholder="2つ目"> <span class="result-icon" id="${qid}_icon"></span></div>`;
        html += `<div class="correct-answer" id="${qid}_ca"></div>`;
        html += `<div class="explanation" id="${qid}_exp">${escHtml(q.explanation || '')}</div>`;
      } else if (q.type === 'fill3') {
        html += `<div class="input-row"><input type="text" id="${qid}_0" autocomplete="off" autocapitalize="off" placeholder="1つ目"> <input type="text" id="${qid}_1" autocomplete="off" autocapitalize="off" placeholder="2つ目"> <input type="text" id="${qid}_2" autocomplete="off" autocapitalize="off" placeholder="3つ目"> <span class="result-icon" id="${qid}_icon"></span></div>`;
        html += `<div class="correct-answer" id="${qid}_ca"></div>`;
        html += `<div class="explanation" id="${qid}_exp">${escHtml(q.explanation || '')}</div>`;
      } else if (q.type === 'choice') {
        html += `<div class="radio-group" id="${qid}_rg">`;
        q.choices.forEach((c, ci) => {
          html += `<label id="${qid}_lbl${ci}"><input type="radio" name="${qid}" value="${ci}"> ${escHtml(c)}</label>`;
        });
        html += `</div>`;
        html += `<span class="result-icon" id="${qid}_icon"></span>`;
        html += `<div class="correct-answer" id="${qid}_ca"></div>`;
        html += `<div class="explanation" id="${qid}_exp">${escHtml(q.explanation || '')}</div>`;
      } else if (q.type === 'free') {
        html += `<textarea class="answer-area" id="${qid}_0" placeholder="ここに回答を入力..."></textarea>`;
        html += `<div class="freetext-model" id="${qid}_model"><strong>模範解答:</strong> ${escHtml(q.model)}</div>`;
      }

      html += `</div>`;
    });

    html += `<div class="btn-row">`;
    html += `<button class="btn btn-grade" onclick="grade('${sec.id}',${wi},${si})">採点する</button>`;
    html += `<button class="btn btn-reset" onclick="resetSection('${sec.id}',${wi},${si})">リセット</button>`;
    html += `</div>`;
    html += `<div class="score-display" id="${sec.id}_score"></div>`;
    html += `</div>`;
  });

  page.innerHTML = html;
  appEl.appendChild(page);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchWeek(wi) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===wi));
  document.querySelectorAll('.week-page').forEach((p,i) => p.classList.toggle('active', i===wi));
}

function grade(secId, wi, si) {
  const sec = DATA[wi].sections[si];
  let correct = 0;
  let total = 0;

  sec.questions.forEach((q, qi) => {
    const qid = `${secId}_q${qi}`;

    if (q.type === 'free') {
      // Just show model answer
      const modelEl = document.getElementById(`${qid}_model`);
      if (modelEl) modelEl.classList.add('show');
      return;
    }

    total++;
    let isCorrect = false;

    if (q.type === 'fill') {
      const inp = document.getElementById(`${qid}_0`);
      isCorrect = checkAnswer(inp.value, q.answers[0]);
      inp.classList.remove('correct','wrong');
      inp.classList.add(isCorrect ? 'correct' : 'wrong');
    } else if (q.type === 'fill2') {
      const inp0 = document.getElementById(`${qid}_0`);
      const inp1 = document.getElementById(`${qid}_1`);
      const c0 = checkAnswer(inp0.value, q.answers[0]);
      const c1 = checkAnswer(inp1.value, q.answers[1]);
      isCorrect = c0 && c1;
      inp0.classList.remove('correct','wrong'); inp0.classList.add(c0?'correct':'wrong');
      inp1.classList.remove('correct','wrong'); inp1.classList.add(c1?'correct':'wrong');
    } else if (q.type === 'fill3') {
      const inp0 = document.getElementById(`${qid}_0`);
      const inp1 = document.getElementById(`${qid}_1`);
      const inp2 = document.getElementById(`${qid}_2`);
      const c0 = checkAnswer(inp0.value, q.answers[0]);
      const c1 = checkAnswer(inp1.value, q.answers[1]);
      const c2 = checkAnswer(inp2.value, q.answers[2]);
      isCorrect = c0 && c1 && c2;
      inp0.classList.remove('correct','wrong'); inp0.classList.add(c0?'correct':'wrong');
      inp1.classList.remove('correct','wrong'); inp1.classList.add(c1?'correct':'wrong');
      inp2.classList.remove('correct','wrong'); inp2.classList.add(c2?'correct':'wrong');
    } else if (q.type === 'choice') {
      const sel = document.querySelector(`input[name="${qid}"]:checked`);
      const val = sel ? parseInt(sel.value) : -1;
      isCorrect = val === q.answer;
      // highlight labels
      q.choices.forEach((_, ci) => {
        const lbl = document.getElementById(`${qid}_lbl${ci}`);
        lbl.classList.remove('correct-choice','wrong-choice');
        if (ci === q.answer) lbl.classList.add('correct-choice');
        else if (ci === val && !isCorrect) lbl.classList.add('wrong-choice');
      });
    }

    if (isCorrect) correct++;

    // icon
    const icon = document.getElementById(`${qid}_icon`);
    icon.innerHTML = isCorrect ? '&#x2705;' : '&#x274C;';
    icon.classList.add('show');

    // correct answer + explanation for wrong
    const caEl = document.getElementById(`${qid}_ca`);
    const expEl = document.getElementById(`${qid}_exp`);
    if (!isCorrect) {
      if (q.type === 'fill') {
        caEl.textContent = `正解: ${q.answers[0][0]}`;
      } else if (q.type === 'fill2') {
        caEl.textContent = `正解: ${q.answers[0][0]} / ${q.answers[1][0]}`;
      } else if (q.type === 'fill3') {
        caEl.textContent = `正解: ${q.answers[0][0]} / ${q.answers[1][0]} / ${q.answers[2][0]}`;
      } else if (q.type === 'choice') {
        caEl.textContent = `正解: ${q.choices[q.answer]}`;
      }
      caEl.classList.add('show');
      expEl.classList.add('show');
    } else {
      caEl.classList.remove('show');
      expEl.classList.remove('show');
    }
  });

  // score
  const scoreEl = document.getElementById(`${secId}_score`);
  if (total > 0) {
    scoreEl.textContent = `${correct} / ${total} 正解`;
    scoreEl.className = 'score-display show';
    const pct = correct / total;
    if (pct === 1) scoreEl.classList.add('perfect');
    else if (pct >= 0.6) scoreEl.classList.add('good');
    else scoreEl.classList.add('needs-work');
  }

  saveProgress(wi, si, correct, total);
}

function resetSection(secId, wi, si) {
  const sec = DATA[wi].sections[si];
  sec.questions.forEach((q, qi) => {
    const qid = `${secId}_q${qi}`;
    if (q.type === 'fill') {
      const inp = document.getElementById(`${qid}_0`);
      inp.value = ''; inp.classList.remove('correct','wrong');
    } else if (q.type === 'fill2') {
      [0,1].forEach(i => { const inp = document.getElementById(`${qid}_${i}`); inp.value=''; inp.classList.remove('correct','wrong'); });
    } else if (q.type === 'fill3') {
      [0,1,2].forEach(i => { const inp = document.getElementById(`${qid}_${i}`); inp.value=''; inp.classList.remove('correct','wrong'); });
    } else if (q.type === 'choice') {
      const sel = document.querySelector(`input[name="${qid}"]:checked`);
      if (sel) sel.checked = false;
      const sec2 = DATA[wi].sections[si];
      sec2.questions[qi].choices.forEach((_, ci) => {
        document.getElementById(`${qid}_lbl${ci}`).classList.remove('correct-choice','wrong-choice');
      });
    } else if (q.type === 'free') {
      const ta = document.getElementById(`${qid}_0`);
      if (ta) ta.value = '';
      const m = document.getElementById(`${qid}_model`);
      if (m) m.classList.remove('show');
    }
    const icon = document.getElementById(`${qid}_icon`);
    if (icon) { icon.classList.remove('show'); icon.innerHTML = ''; }
    const ca = document.getElementById(`${qid}_ca`);
    if (ca) ca.classList.remove('show');
    const exp = document.getElementById(`${qid}_exp`);
    if (exp) exp.classList.remove('show');
  });
  const scoreEl = document.getElementById(`${secId}_score`);
  scoreEl.className = 'score-display';
  scoreEl.textContent = '';

  // Remove progress for this section
  let prog = JSON.parse(localStorage.getItem('engquiz_progress') || '{}');
  delete prog[`${wi}_${si}`];
  localStorage.setItem('engquiz_progress', JSON.stringify(prog));
  updateProgressBar();
}

// ========== PROGRESS ==========
function saveProgress(wi, si, correct, total) {
  let prog = JSON.parse(localStorage.getItem('engquiz_progress') || '{}');
  prog[`${wi}_${si}`] = { correct, total };
  localStorage.setItem('engquiz_progress', JSON.stringify(prog));
  updateProgressBar();
}

function updateProgressBar() {
  let prog = JSON.parse(localStorage.getItem('engquiz_progress') || '{}');
  let completedWeeks = 0;

  DATA.forEach((w, wi) => {
    // A week is complete if all graded sections have been attempted
    const gradedSections = w.sections.filter(s => s.questions.some(q => q.type !== 'free'));
    const allDone = gradedSections.every((s, si) => {
      const actualSi = w.sections.indexOf(s);
      return prog[`${wi}_${actualSi}`] !== undefined;
    });
    const dot = document.getElementById(`dot-${wi}`);
    if (allDone && gradedSections.length > 0) {
      completedWeeks++;
      dot.style.display = 'inline-block';
    } else {
      dot.style.display = 'none';
    }
  });

  document.getElementById('progressText').textContent = `進捗: ${completedWeeks} / 6 週 完了`;
  document.getElementById('progressFill').style.width = `${(completedWeeks/6)*100}%`;
}

updateProgressBar();
</script>
